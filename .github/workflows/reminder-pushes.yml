name: Reminder push cron

# Runs every 5 minutes to send push notifications for due reminders.
# Free on GitHub Actions for public repos; private repos get 2,000 minutes/month free.
# Note: GitHub's scheduled workflows are "best effort" and can be delayed 5–15 min
# under heavy load. For harder realtime guarantees use Supabase pg_cron or a paid cron.

on:
  schedule:
    - cron: "*/5 * * * *"
  # Allow manual runs from the Actions tab for testing
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit reminder cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}          # e.g. https://trackify.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}  # same value as in Vercel env
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::APP_URL or CRON_SECRET secret is not set"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/send-reminder-pushes")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code — $body"
          if [ "$code" != "200" ]; then
            echo "::error::Cron endpoint returned non-200"
            exit 1
          fi
